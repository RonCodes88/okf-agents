name: Release

on:
  push:
    branches: [main]
    paths:
      - "okf_agents/__init__.py"

permissions:
  contents: write

jobs:
  check-version:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      should_release: ${{ steps.meta.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        run: |
          version=$(python -c "
          import re, pathlib
          text = pathlib.Path('okf_agents/__init__.py').read_text()
          print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', text).group(1))
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$version already exists — skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New version $version detected — will release."
          fi

  build:
    name: Build distribution
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[release]"
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [check-version, build]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/okf-agents/
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create git tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"
